services:
  - type: web
    name: qst-shopify-dashboard
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_QST_DEMO_MODE
        value: "false"
      - key: VITE_SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: QST_APP_NAME
        value: QST Listing Workspace
      - key: QST_SHOPIFY_APP_HANDLE
        value: qst-listing-workspace
      - key: VITE_QST_SHOPIFY_APP_HANDLE
        value: qst-listing-workspace
      - key: QST_PLAN_NAME
        value: QST Starter
      - key: QST_SUBSCRIPTION_STATUS
        value: not_checked
      - key: QST_DESKTOP_VERSION
        value: Not configured
      - key: QST_DESKTOP_DOWNLOAD_URL
        value: ""
      - key: QST_PAIRING_TTL_MINUTES
        value: "15"
      - key: DATABASE_URL
        fromDatabase:
          name: qst-shopify-dashboard-db
          property: connectionString

databases:
  - name: qst-shopify-dashboard-db
    databaseName: qst_shopify_dashboard
    user: qst_user
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
