services:
  - type: web
    name: qst-shopify-dashboard
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_QST_DEMO_MODE
        value: "false"
      - key: SHOPIFY_SCOPES
        value: read_products
      - key: VITE_SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: QST_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: QST_APP_NAME
        value: QST Listing Workspace
      - key: QST_SHOPIFY_APP_HANDLE
        value: qst-listing-workspace
      - key: VITE_QST_SHOPIFY_APP_HANDLE
        value: qst-listing-workspace
      - key: QST_PLAN_NAME
        value: QST Starter
      - key: QST_SUBSCRIPTION_STATUS
        value: not_checked
      - key: QST_DESKTOP_VERSION
        value: "1.0.0"
      - key: QST_DESKTOP_DOWNLOAD_URL
        value: https://github.com/q-marx/qst-shopify-dashboard/releases/download/v1.0.0/QST-Setup-v1.0.exe
      - key: QST_DESKTOP_PAIRING_ENABLED
        value: "true"
      - key: QST_PAIRING_TTL_MINUTES
        value: "15"
      - key: EBAY_ENVIRONMENT
        value: sandbox
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_REDIRECT_URI
        sync: false
      - key: EBAY_SCOPES
        value: https://api.ebay.com/oauth/api_scope https://api.ebay.com/oauth/api_scope/sell.inventory https://api.ebay.com/oauth/api_scope/sell.account
      - key: DATABASE_URL
        fromDatabase:
          name: qst-shopify-dashboard-db-frankfurt
          property: connectionString

databases:
  # Keep this database in the same region as qst-shopify-dashboard so Render's
  # internal connection string resolves for the web service.
  - name: qst-shopify-dashboard-db-frankfurt
    databaseName: qst_shopify_dashboard
    user: qst_user
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "15"
    ipAllowList: []
